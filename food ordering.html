<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>QuickBite | Food Delivery</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f8f8f8;
        color: #1e1e1e;
        line-height: 1.4;
      }

      /* simple container */
      .container {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 20px;
      }

      /* ----- HEADER (plain solid colors) ----- */
      header {
        background-color: #ff6b35; /* bright orange, no gradient */
        color: white;
        padding: 18px 0;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      }

      .header-flex {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
      }

      .logo h1 {
        font-size: 28px;
        letter-spacing: 1px;
      }

      .logo p {
        font-size: 13px;
        opacity: 0.9;
      }

      .cart-icon {
        background-color: #e05a2a;
        padding: 10px 20px;
        border-radius: 40px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
        font-size: 18px;
      }

      .cart-icon:hover {
        background-color: #c74e1f;
      }

      /* ----- search & filter (simple) ----- */
      .search-section {
        margin: 28px 0 20px 0;
      }

      .search-box {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }

      .search-box input {
        flex: 2;
        padding: 12px 16px;
        border: 1px solid #ccc;
        border-radius: 40px;
        font-size: 16px;
        background: white;
        outline: none;
      }

      .search-box input:focus {
        border-color: #ff6b35;
      }

      .search-box button {
        background-color: #ff6b35;
        border: none;
        padding: 12px 24px;
        border-radius: 40px;
        font-weight: bold;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s;
      }

      .search-box button:hover {
        background-color: #e55a27;
      }

      /* category filter chips (simple) */
      .categories {
        margin: 20px 0 24px 0;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .cat-btn {
        background-color: #eaeaea;
        border: none;
        padding: 8px 20px;
        border-radius: 30px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
        color: #333;
      }

      .cat-btn.active {
        background-color: #ff6b35;
        color: white;
      }

      .cat-btn:hover {
        background-color: #d4d4d4;
      }

      /* ----- restaurant / food items grid (beginner flex grid) ----- */
      .items-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 24px;
        margin: 20px 0 40px;
      }

      .food-card {
        background: white;
        border-radius: 20px;
        width: calc(33.333% - 16px);
        min-width: 250px;
        flex: 1 1 260px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        transition: 0.2s;
        overflow: hidden;
        border: 1px solid #eee;
      }

      .food-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
      }

      .card-img {
        width: 100%;
        height: 160px;
        background-color: #ffcdb0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        background-size: cover;
        background-position: center;
      }

      /* simple colored placeholder images */
      .card-info {
        padding: 16px;
      }

      .card-info h3 {
        font-size: 1.3rem;
        margin-bottom: 6px;
      }

      .category-badge {
        display: inline-block;
        background-color: #f0f0f0;
        font-size: 12px;
        padding: 4px 10px;
        border-radius: 30px;
        margin: 6px 0;
      }

      .price {
        font-weight: bold;
        font-size: 1.25rem;
        margin: 10px 0;
        color: #ff6b35;
      }

      .add-btn {
        background-color: #ff6b35;
        border: none;
        width: 100%;
        padding: 10px 0;
        border-radius: 40px;
        font-weight: bold;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s;
        margin-top: 6px;
      }

      .add-btn:hover {
        background-color: #e55a27;
      }

      /* cart sidebar (simple overlay) */
      .cart-overlay {
        position: fixed;
        top: 0;
        right: -100%;
        width: 320px;
        height: 100%;
        background-color: white;
        box-shadow: -2px 0 12px rgba(0, 0, 0, 0.2);
        transition: right 0.3s ease;
        z-index: 1000;
        display: flex;
        flex-direction: column;
      }

      .cart-overlay.open {
        right: 0;
      }

      .cart-header {
        background-color: #ff6b35;
        color: white;
        padding: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .cart-header h2 {
        font-size: 1.5rem;
      }

      .close-cart {
        background: none;
        border: none;
        font-size: 28px;
        color: white;
        cursor: pointer;
      }

      .cart-items-list {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }

      .cart-item {
        display: flex;
        justify-content: space-between;
        border-bottom: 1px solid #ddd;
        padding: 12px 0;
      }

      .cart-item-details h4 {
        font-size: 1rem;
      }

      .cart-item-price {
        color: #ff6b35;
        font-weight: bold;
      }

      .item-actions {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      .item-actions button {
        background-color: #eee;
        border: none;
        width: 28px;
        height: 28px;
        border-radius: 30px;
        font-weight: bold;
        font-size: 18px;
        cursor: pointer;
      }

      .cart-total {
        padding: 20px;
        border-top: 2px solid #eee;
        font-weight: bold;
        font-size: 1.3rem;
        background: #fafafa;
      }

      .checkout-btn {
        background-color: #ff6b35;
        width: calc(100% - 40px);
        margin: 0 20px 30px 20px;
        padding: 14px;
        border: none;
        border-radius: 40px;
        font-size: 18px;
        font-weight: bold;
        color: white;
        cursor: pointer;
      }

      .empty-cart {
        text-align: center;
        color: #777;
        padding: 30px 0;
      }

      footer {
        background-color: #2c2c2c;
        color: #ddd;
        text-align: center;
        padding: 20px;
        margin-top: 20px;
        font-size: 14px;
      }

      @media (max-width: 700px) {
        .food-card {
          width: calc(50% - 12px);
        }
      }

      @media (max-width: 500px) {
        .food-card {
          width: 100%;
        }
        .cart-overlay {
          width: 280px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container header-flex">
        <div class="logo">
          <h1>🍕 QuickBite</h1>
          <p>Food delivered • Fast & Fresh</p>
        </div>
        <div class="cart-icon" id="cartIconBtn">
          🛒 Cart (<span id="cartCount">0</span>)
        </div>
      </div>
    </header>

    <main class="container">
      <!-- search & filter section beginner style -->
      <div class="search-section">
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="Search for pizza, burger, biryani..."
          />
          <button id="searchBtn">🔍 Search</button>
        </div>
        <div class="categories" id="categoryFilter">
          <button class="cat-btn active" data-cat="all">All</button>
          <button class="cat-btn" data-cat="Pizza">🍕 Pizza</button>
          <button class="cat-btn" data-cat="Burger">🍔 Burger</button>
          <button class="cat-btn" data-cat="Biryani">🍛 Biryani</button>
          <button class="cat-btn" data-cat="Pasta">🍝 Pasta</button>
          <button class="cat-btn" data-cat="Dessert">🍰 Dessert</button>
        </div>
      </div>

      <!-- Food items grid dynamically loaded -->
      <div id="foodItemsGrid" class="items-grid"></div>
    </main>

    <footer>
      <p>© 2025 QuickBite | Hungry? Order now! (Beginner project)</p>
    </footer>

    <!-- Cart Sidebar -->
    <div id="cartSidebar" class="cart-overlay">
      <div class="cart-header">
        <h2>Your Cart</h2>
        <button class="close-cart" id="closeCartBtn">&times;</button>
      </div>
      <div id="cartItemsContainer" class="cart-items-list">
        <div class="empty-cart">Cart is empty 🍽️</div>
      </div>
      <div class="cart-total" id="cartTotalPrice">Total: ₹0</div>
      <button class="checkout-btn" id="checkoutBtn">Checkout 🚀</button>
    </div>

    <script>
      const menuItems = [
        {
          id: 1,
          name: "Margherita Pizza",
          category: "Pizza",
          price: 299,
          imgEmoji: "🍕",
          desc: "Classic cheese & tomato",
        },
        {
          id: 2,
          name: "Pepperoni Pizza",
          category: "Pizza",
          price: 399,
          imgEmoji: "🍕🔥",
          desc: "Spicy pepperoni",
        },
        {
          id: 3,
          name: "Veg Burger",
          category: "Burger",
          price: 149,
          imgEmoji: "🍔",
          desc: "Fresh lettuce & patty",
        },
        {
          id: 4,
          name: "Chicken Burger",
          category: "Burger",
          price: 199,
          imgEmoji: "🍔🐔",
          desc: "Grilled chicken",
        },
        {
          id: 5,
          name: "Hyderabadi Biryani",
          category: "Biryani",
          price: 279,
          imgEmoji: "🍛",
          desc: "Aromatic rice & spices",
        },
        {
          id: 6,
          name: "Veg Biryani",
          category: "Biryani",
          price: 219,
          imgEmoji: "🥘",
          desc: "Mixed vegetables",
        },
        {
          id: 7,
          name: "White Sauce Pasta",
          category: "Pasta",
          price: 229,
          imgEmoji: "🍝",
          desc: "Creamy & cheesy",
        },
        {
          id: 8,
          name: "Red Sauce Pasta",
          category: "Pasta",
          price: 209,
          imgEmoji: "🍝🌶️",
          desc: "Tangy tomato sauce",
        },
        {
          id: 9,
          name: "Gulab Jamun",
          category: "Dessert",
          price: 99,
          imgEmoji: "🍘",
          desc: "2 pcs hot dessert",
        },
        {
          id: 10,
          name: "Chocolate Brownie",
          category: "Dessert",
          price: 129,
          imgEmoji: "🍫",
          desc: "with nuts",
        },
      ];

      let cart = []; // each item { id, name, price, quantity }
      let activeCategory = "all";
      let searchQuery = "";

      // Helper: get DOM elements
      const foodGrid = document.getElementById("foodItemsGrid");
      const cartCountSpan = document.getElementById("cartCount");
      const cartSidebar = document.getElementById("cartSidebar");
      const cartItemsContainer = document.getElementById("cartItemsContainer");
      const cartTotalSpan = document.getElementById("cartTotalPrice");
      const searchInput = document.getElementById("searchInput");
      const searchBtn = document.getElementById("searchBtn");

      // ---------- CART FUNCTIONS (basic) ----------
      function updateCartUI() {
        // update cart count in header
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        cartCountSpan.innerText = totalItems;

        // render cart sidebar items
        if (cart.length === 0) {
          cartItemsContainer.innerHTML = `<div class="empty-cart">Cart is empty 🍽️</div>`;
          cartTotalSpan.innerText = `Total: ₹0`;
          return;
        }

        let cartHtml = "";
        let totalPrice = 0;
        for (let i = 0; i < cart.length; i++) {
          const item = cart[i];
          const itemTotal = item.price * item.quantity;
          totalPrice += itemTotal;
          cartHtml += `
        <div class="cart-item" data-id="${item.id}">
          <div class="cart-item-details">
            <h4>${item.name}</h4>
            <div class="cart-item-price">₹${item.price} x ${item.quantity}</div>
          </div>
          <div class="item-actions">
            <button class="cart-decr" data-id="${item.id}">-</button>
            <span style="min-width: 20px; text-align:center;">${item.quantity}</span>
            <button class="cart-incr" data-id="${item.id}">+</button>
            <button class="cart-remove" data-id="${item.id}" style="background:#ffb3b3;">🗑️</button>
          </div>
        </div>
      `;
        }
        cartItemsContainer.innerHTML = cartHtml;
        cartTotalSpan.innerText = `Total: ₹${totalPrice}`;

        // attach event listeners to cart dynamic buttons (simple inline binding)
        document.querySelectorAll(".cart-incr").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            const id = parseInt(btn.getAttribute("data-id"));
            updateQuantity(id, 1);
          });
        });
        document.querySelectorAll(".cart-decr").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            const id = parseInt(btn.getAttribute("data-id"));
            updateQuantity(id, -1);
          });
        });
        document.querySelectorAll(".cart-remove").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            const id = parseInt(btn.getAttribute("data-id"));
            removeItemFromCart(id);
          });
        });
      }

      function updateQuantity(itemId, change) {
        const index = cart.findIndex((i) => i.id === itemId);
        if (index === -1) return;
        const newQty = cart[index].quantity + change;
        if (newQty <= 0) {
          cart.splice(index, 1);
        } else {
          cart[index].quantity = newQty;
        }
        updateCartUI();
        renderFoodGrid(); // refresh grid (to update button text maybe? but optional)
      }

      function removeItemFromCart(itemId) {
        cart = cart.filter((i) => i.id !== itemId);
        updateCartUI();
        renderFoodGrid();
      }

      function addToCart(itemId) {
        const menuItem = menuItems.find((m) => m.id === itemId);
        if (!menuItem) return;
        const existing = cart.find((i) => i.id === itemId);
        if (existing) {
          existing.quantity += 1;
        } else {
          cart.push({
            id: menuItem.id,
            name: menuItem.name,
            price: menuItem.price,
            quantity: 1,
          });
        }
        updateCartUI();
        renderFoodGrid(); // re-render to show "Added ✓" style or just keep add button but we'll show normal add button but ok.
        // optional simple animation: no need.
      }

      // helper to get item quantity in cart
      function getCartQty(itemId) {
        const found = cart.find((i) => i.id === itemId);
        return found ? found.quantity : 0;
      }

      // ---------- FILTER & SEARCH LOGIC (beginner style) ----------
      function getFilteredItems() {
        let filtered = [...menuItems];
        // filter by category
        if (activeCategory !== "all") {
          filtered = filtered.filter(
            (item) => item.category === activeCategory,
          );
        }
        // filter by search query (case insensitive)
        if (searchQuery.trim() !== "") {
          const lowerQuery = searchQuery.toLowerCase();
          filtered = filtered.filter(
            (item) =>
              item.name.toLowerCase().includes(lowerQuery) ||
              item.category.toLowerCase().includes(lowerQuery) ||
              item.desc.toLowerCase().includes(lowerQuery),
          );
        }
        return filtered;
      }

      function renderFoodGrid() {
        const itemsToShow = getFilteredItems();
        if (itemsToShow.length === 0) {
          foodGrid.innerHTML = `<div style="width:100%; text-align:center; padding: 40px;">🍽️ No items found 😢</div>`;
          return;
        }
        let gridHtml = "";
        for (let i = 0; i < itemsToShow.length; i++) {
          const item = itemsToShow[i];
          const qtyInCart = getCartQty(item.id);
          const buttonText =
            qtyInCart > 0 ? `✓ Added (${qtyInCart})` : "Add to Cart";
          // simple background color for image placeholder
          const bgColors = [
            "#ffe0cc",
            "#ffd9b5",
            "#ffe6d5",
            "#ffd9cc",
            "#ffe0d0",
          ];
          const bgIndex = item.id % bgColors.length;
          gridHtml += `
        <div class="food-card">
          <div class="card-img" style="background-color: ${bgColors[bgIndex]}; font-size: 3rem;">
            ${item.imgEmoji}
          </div>
          <div class="card-info">
            <h3>${item.name}</h3>
            <span class="category-badge">${item.category}</span>
            <div class="price">₹${item.price}</div>
            <p style="font-size: 13px; color:#666; margin-bottom: 8px;">${item.desc}</p>
            <button class="add-btn" data-id="${item.id}">${buttonText}</button>
          </div>
        </div>
      `;
        }
        foodGrid.innerHTML = gridHtml;

        // attach event listeners to all add buttons
        const addBtns = document.querySelectorAll(".add-btn");
        addBtns.forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const id = parseInt(btn.getAttribute("data-id"));
            addToCart(id);
          });
        });
      }

      // category filter handlers
      function setupCategoryFilters() {
        const catBtns = document.querySelectorAll(".cat-btn");
        catBtns.forEach((btn) => {
          btn.addEventListener("click", () => {
            // update active class
            catBtns.forEach((b) => b.classList.remove("active"));
            btn.classList.add("active");
            const catValue = btn.getAttribute("data-cat");
            activeCategory = catValue;
            renderFoodGrid();
          });
        });
      }

      // search handlers
      function handleSearch() {
        searchQuery = searchInput.value;
        renderFoodGrid();
      }

      // cart sidebar open/close
      function openCart() {
        cartSidebar.classList.add("open");
      }
      function closeCart() {
        cartSidebar.classList.remove("open");
      }

      // checkout simple alert
      function checkoutAction() {
        if (cart.length === 0) {
          alert("Your cart is empty! Add some delicious items.");
        } else {
          const totalItems = cart.reduce((sum, i) => sum + i.quantity, 0);
          alert(
            `✅ Order placed! Total items: ${totalItems}\nTotal amount: ${cartTotalSpan.innerText}\nThank you for ordering from QuickBite! 🚴‍♂️`,
          );
          // clear cart after order (beginner style)
          cart = [];
          updateCartUI();
          renderFoodGrid();
          closeCart();
        }
      }

      // ---------- EVENT LISTENERS & INITIALIZATION ----------
      function init() {
        renderFoodGrid();
        setupCategoryFilters();
        updateCartUI();

        // cart icon
        const cartIcon = document.getElementById("cartIconBtn");
        cartIcon.addEventListener("click", openCart);
        const closeBtn = document.getElementById("closeCartBtn");
        closeBtn.addEventListener("click", closeCart);
        // optional: click outside to close? not needed for simplicity

        searchBtn.addEventListener("click", handleSearch);
        searchInput.addEventListener("keyup", (e) => {
          if (e.key === "Enter") {
            handleSearch();
          }
        });

        const checkoutBtn = document.getElementById("checkoutBtn");
        checkoutBtn.addEventListener("click", checkoutAction);
      }

      // start everything
      init();
    </script>
  </body>
</html>
