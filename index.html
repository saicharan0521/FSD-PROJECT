<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>QuickBite | Food Delivery</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="container header-flex">
        <div class="logo">
          <h1>🍕 QuickBite</h1>
          <p>Food delivered • Fast & Fresh</p>
        </div>
        <div class="cart-icon" id="cartIconBtn">
          🛒 Cart (<span id="cartCount">0</span>)
        </div>
      </div>
    </header>

    <main class="container">
      <!-- search & filter section beginner style -->
      <div class="search-section">
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="Search for pizza, burger, biryani..."
          />
          <button id="searchBtn">🔍 Search</button>
        </div>
        <div class="categories" id="categoryFilter">
          <button class="cat-btn active" data-cat="all">All</button>
          <button class="cat-btn" data-cat="Pizza">🍕 Pizza</button>
          <button class="cat-btn" data-cat="Burger">🍔 Burger</button>
          <button class="cat-btn" data-cat="Biryani">🍛 Biryani</button>
          <button class="cat-btn" data-cat="Pasta">🍝 Pasta</button>
          <button class="cat-btn" data-cat="Dessert">🍰 Dessert</button>
        </div>
      </div>

      <!-- Food items grid dynamically loaded -->
      <div id="foodItemsGrid" class="items-grid"></div>
    </main>

    <footer>
      <p>© 2025 QuickBite | Hungry? Order now! (Beginner project)</p>
    </footer>

    <!-- Cart Sidebar -->
    <div id="cartSidebar" class="cart-overlay">
      <div class="cart-header">
        <h2>Your Cart</h2>
        <button class="close-cart" id="closeCartBtn">&times;</button>
      </div>
      <div id="cartItemsContainer" class="cart-items-list">
        <div class="empty-cart">Cart is empty 🍽️</div>
      </div>
      <div class="cart-total" id="cartTotalPrice">Total: ₹0</div>
      <button class="checkout-btn" id="checkoutBtn">Checkout 🚀</button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
